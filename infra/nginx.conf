server {
    listen 80;
    server_name erp.gsi.mg;

    # Redirection du trafic HTTP vers HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name erp.gsi.mg;

    # Chemins vers les certificats SSL (à générer via Certbot)
    ssl_certificate /etc/letsencrypt/live/erp.gsi.mg/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.gsi.mg/privkey.pem;

    # Sécurité et Hardening SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

    # Répertoire racine des fichiers statiques exportés par Expo Web (pnpm build:web)
    root /var/www/erp-gsi/web-dist;
    index index.html;

    # En-têtes de sécurité supplémentaires
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    # Gérer la Single Page Application (SPA) - React Navigation Web
    location / {
        try_files $uri $uri/ /index.html;
        
        # Mise en cache optimisée pour les assets statiques
        location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
            expires 6M;
            access_log off;
            add_header Cache-Control "public, max-age=15552000, immutable";
        }
    }
}
