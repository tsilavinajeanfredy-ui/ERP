name: Deploy Supabase Functions

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'supabase/functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install supabase CLI
        run: npm install -g supabase

      - name: Deploy send-notification function
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "Required secrets SUPABASE_URL and SUPABASE_ACCESS_TOKEN are not set"; exit 1
          fi
          PROJECT_REF=$(echo "$SUPABASE_URL" | sed -E 's#https?://([^.]+)\..*#\1#')
          echo "Project ref: $PROJECT_REF"
          supabase login --token "$SUPABASE_ACCESS_TOKEN"
          cd supabase/functions/send-notification || exit 1
          supabase functions deploy send-notification --project-ref "$PROJECT_REF" --no-verify-jwt

# Notes:
# - Set repository secrets: SUPABASE_URL (https://<project-ref>.supabase.co) and SUPABASE_ACCESS_TOKEN
# - Trigger manually via the Actions tab or push changes under supabase/functions/**
